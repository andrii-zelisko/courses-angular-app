<header class="header-container">
  <div class="header-left">
    <app-logo></app-logo>
  </div>
  <div class="user-container">
    @if (auth.user()) {
      <div class="user-info">
        <span class="user-name">{{ auth.user()?.name }}</span>
          <app-button [text]=BUTTON_NAMES.LOGOUT (clicked)="logout()"></app-button>
      </div>
    }
  </div>
</header>
